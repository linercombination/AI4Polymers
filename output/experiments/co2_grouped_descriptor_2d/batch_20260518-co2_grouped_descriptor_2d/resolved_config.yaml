seed: 42
experiment:
  display_name: CO2 grouped comparison - Track 1 2D descriptor
  representation_track: track_1_descriptor_2d
  runner_status: ready
representation:
  method: descriptor_2d
dataset:
  csv_path: output/cleaned_data/co2_main_subset.csv
  target_column: log10_p_co2_barrer
  group_column: membrane_name_raw
  id_columns:
  - sample_id
  - membrane_name_raw
  - source_sheet
  - source_row_excel
features:
  smiles_column: smiles_single
  aging_column: aging_days
  thickness_column: thickness_um
  fingerprint_radius: 2
  fingerprint_bits: 512
cv:
  mode: group_kfold
  n_splits: 5
models:
- ridge
- random_forest
- svr
- hist_gb
- xgboost
output:
  root_dir: output/experiments/co2_grouped_descriptor_2d
